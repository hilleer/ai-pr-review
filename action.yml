name: 'AI PR Review'
description: 'Post an AI code review on pull requests using any OpenAI-compatible API endpoint'
author: 'hilleer'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  api_key:
    description: 'API key for your model provider'
    required: true

  base_url:
    description: |
      Base URL for the OpenAI-compatible chat completions API.
      Examples:
        Moonshot (Kimi):  https://api.moonshot.cn/v1
        Zhipu (GLM):      https://open.bigmodel.cn/api/paas/v4
        OpenAI:           https://api.openai.com/v1
        Mistral:          https://api.mistral.ai/v1
        Groq:             https://api.groq.com/openai/v1
        Together:         https://api.together.xyz/v1
        DeepSeek:         https://api.deepseek.com/v1
        Local (Ollama):   http://localhost:11434/v1
    required: true

  model:
    description: 'Model name (e.g. kimi-k2-0711-preview, glm-4-plus, gpt-4o, mistral-large-latest)'
    required: true

  trigger_phrase:
    description: |
      Comment phrase that triggers an on-demand review.
      Only relevant when using the issue_comment event trigger.
      Example: /ai-review
    required: false
    default: '/ai-review'

  system_prompt:
    description: 'Custom system prompt. Leave empty to use the built-in code review prompt.'
    required: false
    default: ''

  file_patterns:
    description: 'Comma-separated glob patterns of files to include in the review'
    required: false
    default: '*.ts,*.tsx,*.js,*.jsx,*.py,*.go,*.java,*.cs,*.rb,*.rs,*.cpp,*.c,*.h'

  exclude_patterns:
    description: 'Comma-separated glob patterns of files to exclude from the review'
    required: false
    default: '*.lock,*.snap,*-lock.json,*.min.js,dist/*,build/*,node_modules/*'

  max_tokens:
    description: 'Maximum tokens in the model response'
    required: false
    default: '2048'

  max_diff_chars:
    description: 'Maximum characters of diff to send. Increase for models with large context windows.'
    required: false
    default: '80000'

  post_mode:
    description: |
      How to post the review:
        comment  - Single PR comment (default, works everywhere)
        review   - GitHub PR Review (shows in the Reviews tab, informational only)
      Note: 'review' mode posts as COMMENT event (doesn't approve or request changes).
    required: false
    default: 'comment'

  language:
    description: 'Language for the review response (e.g. english, danish, german)'
    required: false
    default: 'english'

  github_token:
    description: 'GitHub token for posting comments. Defaults to the built-in GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

  debounce_minutes:
    description: |
      Minutes to wait before allowing another review on the same PR.
      Prevents duplicate reviews from accidental double-clicks.
      Set to 0 to disable debouncing.
    required: false
    default: '1'

outputs:
  review_body:
    description: 'The review text returned by the model (first 1000 chars)'
    value: ${{ steps.run_review.outputs.review_body }}

  model_used:
    description: 'The model that performed the review'
    value: ${{ steps.run_review.outputs.model_used }}

runs:
  using: 'composite'
  steps:
    # ── Step 1: Resolve PR context ─────────────────────────────────────────────
    # gh pr view works for both triggers:
    #   pull_request  → PR number is in the event payload
    #   issue_comment → issue number == PR number; gh fetches the rest
    - name: Resolve PR context
      id: pr_context
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER_DIRECT: ${{ github.event.pull_request.number }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: |
        if [ "$EVENT_NAME" = "issue_comment" ]; then
          echo "Triggered via issue_comment — resolving PR context with gh..."
          PR_NUMBER="$ISSUE_NUMBER"
        else
          echo "Triggered via pull_request — resolving PR context with gh..."
          PR_NUMBER="$PR_NUMBER_DIRECT"
        fi

        HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid') || {
          echo "::error::Failed to fetch PR #$PR_NUMBER. Verify the PR exists and you have read access."
          exit 1
        }
        BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName') || {
          echo "::error::Failed to fetch base ref for PR #$PR_NUMBER"
          exit 1
        }

        echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
        echo "base_ref=$BASE_REF"   >> "$GITHUB_OUTPUT"
        echo "Resolved: PR #$PR_NUMBER, base=$BASE_REF, sha=$HEAD_SHA"

    # ── Step 2: React to the trigger comment ──────────────────────────────────
    # Adds a 👀 reaction to acknowledge the request before the review starts.
    # Only runs for issue_comment trigger; no-ops for pull_request.
    - name: React to trigger comment
      if: github.event_name == 'issue_comment'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        COMMENT_ID: ${{ github.event.comment.id }}
      run: |
        gh api repos/$GH_REPO/issues/comments/$COMMENT_ID/reactions \
          -f content=eyes > /dev/null && echo "👀 reaction added" || \
          echo "::warning::Failed to add reaction (may need 'issues: write' permission)"

    # ── Step 3: Checkout at the PR head SHA ───────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr_context.outputs.head_sha }}
        fetch-depth: 0

    # ── Step 4: Generate diff ─────────────────────────────────────────────────
    # Uses three-dot diff (A...B) which shows changes from the merge base of A and B.
    # This shows only changes introduced by the PR, not changes from the base branch.
    - name: Generate diff
      shell: bash
      env:
        BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
        HEAD_SHA: ${{ steps.pr_context.outputs.head_sha }}
      run: |
        INCLUDE_ARRAY=()
        IFS=',' read -ra INCLUDES <<< "${{ inputs.file_patterns }}"
        for p in "${INCLUDES[@]}"; do
          p=$(echo "$p" | xargs)
          INCLUDE_ARRAY+=("$p")
        done

        if [ ${#INCLUDE_ARRAY[@]} -gt 0 ]; then
          git diff "origin/$BASE_REF"...$HEAD_SHA -- "${INCLUDE_ARRAY[@]}" > /tmp/pr_diff_raw.txt 2>/dev/null || {
            echo "::warning::Filtered diff failed, falling back to unfiltered diff"
            git diff "origin/$BASE_REF"...$HEAD_SHA > /tmp/pr_diff_raw.txt
          }
        else
          git diff "origin/$BASE_REF"...$HEAD_SHA > /tmp/pr_diff_raw.txt
        fi

        cp /tmp/pr_diff_raw.txt /tmp/pr_diff.txt
        IFS=',' read -ra EXCLUDES <<< "${{ inputs.exclude_patterns }}"
        for p in "${EXCLUDES[@]}"; do
          p=$(echo "$p" | xargs)
          PATTERN=$(echo "$p" | sed 's/\*/.*/g')
          grep -v "^diff --git.*$PATTERN" /tmp/pr_diff.txt > /tmp/pr_diff_filtered.txt && \
            mv /tmp/pr_diff_filtered.txt /tmp/pr_diff.txt || true
        done

        LINES=$(wc -l < /tmp/pr_diff.txt)
        SIZE=$(wc -c < /tmp/pr_diff.txt)
        echo "Diff: $LINES lines, $SIZE bytes"

    # ── Step 5: Run the AI review ─────────────────────────────────────────────
    - name: Run AI review
      id: run_review
      shell: bash
      env:
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_BASE_URL: ${{ inputs.base_url }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        INPUT_MAX_TOKENS: ${{ inputs.max_tokens }}
        INPUT_MAX_DIFF_CHARS: ${{ inputs.max_diff_chars }}
        INPUT_POST_MODE: ${{ inputs.post_mode }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
        INPUT_DEBOUNCE_MINUTES: ${{ inputs.debounce_minutes }}
        EVENT_NAME: ${{ github.event_name }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        GH_TOKEN: ${{ inputs.github_token }}
        GH_REPO: ${{ github.repository }}
        GH_PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
        GH_SHA: ${{ steps.pr_context.outputs.head_sha }}
      run: python3 ${{ github.action_path }}/review.py
